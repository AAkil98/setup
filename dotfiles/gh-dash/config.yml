# ~/.config/gh-dash/config.yml — PR/issue dashboard (run: gh dash)
# Sections tuned for your two orgs (AAkil98 personal + Madahub-dev).

prSections:
  - title: My PRs
    filters: is:open author:@me
  - title: Needs my review
    filters: is:open review-requested:@me
  - title: Madahub-dev
    filters: is:open org:Madahub-dev -author:@me

issuesSections:
  - title: My issues
    filters: is:open author:@me
  - title: Assigned to me
    filters: is:open assignee:@me

defaults:
  preview:
    open: true
    width: 60
  prsLimit: 20
  issuesLimit: 20
