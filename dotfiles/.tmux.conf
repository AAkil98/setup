# ~/.tmux.conf — managed by github.com/AAkil98/setup

# --- General -----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # truecolor passthrough
set -g mouse on
set -g history-limit 50000
set -g base-index 1                 # number windows from 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on
setw -g mode-keys vi                # vi keys in copy mode

# --- Prefix: Ctrl-a ----------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Splits/windows keep the current path ------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# --- Status bar (Catppuccin Mocha, hand-rolled for robustness) ---------------
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#1e1e2e] "
set -g status-left-length 30
set -g status-right "#[fg=#a6adc8]%a %d %b  #[fg=#89b4fa]%H:%M "
set -g window-status-format "#[fg=#a6adc8] #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#f9e2af,bold] #I:#W "
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g message-style "bg=#313244,fg=#cdd6f4"

# --- Plugins (tpm) -----------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save
set -g @continuum-restore 'on'

# Keep this line at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
